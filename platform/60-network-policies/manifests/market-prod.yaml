# market-prod: market-dev와 동일한 정책. namespace만 다름.
# Kubernetes NetworkPolicy는 namespace-scoped라 매니페스트 별도 필요.

# 1) Default deny
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: market-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# 2) api-gateway ← Istio ingressgateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-allow-ingressgateway
  namespace: market-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 8100

---
# 3) backend gRPC ← api-gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-grpc-allow-gateway
  namespace: market-prod
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - auth-service
          - product-service
          - order-service
          - inventory-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 9001
        - protocol: TCP
          port: 9002
        - protocol: TCP
          port: 9003
        - protocol: TCP
          port: 9005

---
# 4) user-service REST ← api-gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: user-service-allow-gateway
  namespace: market-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: user-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 8004

---
# 5) order-service admin REST ← api-gateway
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: order-service-admin-allow-gateway
  namespace: market-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: order-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 8002

---
# 6) Prometheus scrape ← monitoring namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-scrape-allow
  namespace: market-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8001
        - protocol: TCP
          port: 8002
        - protocol: TCP
          port: 8003
        - protocol: TCP
          port: 8004
        - protocol: TCP
          port: 8005
        - protocol: TCP
          port: 8100

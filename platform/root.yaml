# platform 레이어의 App-of-Apps root.
# include 글로브로 platform/*/application.yaml, platform/*/*/application.yaml 만 sync.
# 각 컴포넌트는 자체 sync-wave annotation으로 순서 강제 (CRD → operator → workload).
#
# Phase 1 시점: platform/ 하위에 application.yaml이 아직 없으므로 sync 대상 0건.
#               Phase 5에서 cert-manager / istio / observability / kafka / postgres 등이 추가된다.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/KTCloud-CloudNative-Troica-Team/msa-argocd-manifest.git
    targetRevision: main
    path: platform
    directory:
      recurse: true
      include: '{*/application.yaml,*/*/application.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

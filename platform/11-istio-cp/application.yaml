# R-03 / R-35 (d): Istio control plane (istiod) + Ingress Gateway.
# Sync Wave -4: istio-base CRD 설치 후.
#
# 본 PoC 단계 — PeerAuthentication STRICT 로 클러스터 전체 mTLS 강제 (별도 PeerAuthentication
# 매니페스트는 platform/11-istio-cp/manifests/ 에 추가 가능). market-{dev,prod}
# namespace 의 sidecar 자동 주입 label 은 R-49 NetworkPolicy / 각 서비스 Deployment
# annotation 으로 이미 처리됨.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-cp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  sources:
    - chart: istiod
      repoURL: https://istio-release.storage.googleapis.com/charts
      targetRevision: 1.23.3
      helm:
        releaseName: istiod
        values: |
          # PoC 규모 단일 replica
          pilot:
            replicaCount: 1
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 1Gi
          # Telemetry — Prometheus scrape 가능하도록 ServiceMonitor 생성
          telemetry:
            enabled: true
            v2:
              enabled: true
              prometheus:
                enabled: true
          # 모든 신규 sidecar 가 디폴트로 mTLS STRICT 모드 작동
          meshConfig:
            defaultConfig:
              proxyMetadata: {}
              tracing:
                sampling: 100.0
            enableTracing: true
    - chart: gateway
      repoURL: https://istio-release.storage.googleapis.com/charts
      targetRevision: 1.23.3
      helm:
        releaseName: istio-ingressgateway
        # Istio gateway chart 1.23 의 values.yaml 의 주석 (코드 직접 확인):
        #   "Users should NOT set .defaults explicitly, but rather directly
        #    set the fields internally."
        # 즉 사용자는 defaults: wrapper 없이 service.type 처럼 직접 작성해야 함.
        # `defaults:` 는 helm chart 의 내부 workaround — 사용자 측 사용 안 함.
        # 첫 사이클의 `defaults:` wrap fix (PR #88) 가 잘못된 방향. 정정.
        #
        # `skipSchemaValidation: true` 는 ArgoCD 의 strict schema 검증을 무시.
        # helm CLI 자체는 두 패턴 모두 받지만 ArgoCD 의 helm 측이 더 strict 라
        # skip 필요. (helm 3.13+ 의 --skip-schema-validation 와 동일)
        skipSchemaValidation: true
        values: |
          # istio gateway chart 1.23.3 의 templates/deployment.yaml 의 image field 는
          # hardcoded `image: auto` (chart values 에서 받지 않는 placeholder). sidecar
          # inject mutating webhook 가 실 image (docker.io/istio/proxyv2:1.23.3) 로
          # mutate 하도록 설계. 따라서 helm values 에 image 명시해도 무시됨.
          # 해결 위치: platform/12-istio-gateway/manifests/namespace-injection.yaml 에
          # istio-system namespace 의 `istio-injection: enabled` label 추가 →
          # webhook 가 ingressgateway 의 image 정상 mutate.
          # 외부 진입점 — NLB target. PoC 단계 NodePort 30080/30443.
          service:
            type: NodePort
            ports:
              - name: status-port
                port: 15021
                targetPort: 15021
                nodePort: 30021
              - name: http2
                port: 80
                targetPort: 80
                nodePort: 30080
              - name: https
                port: 443
                targetPort: 443
                nodePort: 30443
          replicaCount: 1
          # chart 의 autoscaling default = enabled. PoC 규모라 disable.
          autoscaling:
            enabled: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

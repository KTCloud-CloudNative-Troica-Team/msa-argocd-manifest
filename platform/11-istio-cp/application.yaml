# R-03 / R-35 (d): Istio control plane (istiod) — Ingress Gateway 는 분리됨.
#
# Sync Wave -2: istio-base (-5) + istio-gateway namespace label (-3) 다음에 sync.
#
# 본 Application 의 책임 변경 — 이전엔 istiod + gateway chart multi-source.
# 매 cluster destroy + apply 마다 ingressgateway pod 의 ImagePullBackOff 가
# 재발한 진짜 root cause = 같은 Application 안 두 chart 의 race:
#   1. istiod Deployment 생성 (pod 아직 Ready X)
#   2. gateway chart 의 ingressgateway Deployment 동시 생성 → 첫 pod 시도
#   3. sidecar inject MutatingWebhookConfiguration 호출 → istiod endpoint
#      비어 있음 → webhook fail (failurePolicy=Fail 의 retry 또는 skip)
#   4. image `auto` 인 채 stale pod 생성되면 ImagePullBackOff lock
#   5. istiod 이후 Ready 되어도 ingressgateway template 불변 → stale pod 갱신 X
#
# PR #111 (namespace inject label) + PR #117 (Wave -4 → -2) 은 Application
# 부모 ordering 만 해결. 같은 Application 안 race 는 못 다룸.
#
# 영구 해결 = ingressgateway 를 platform/13-istio-ingressgateway/ 로 분리
# (Wave -1). istio-cp 가 istiod 만 install + Healthy 검증 후 다음 wave 진행
# → 13 에서 ingressgateway sync 시 webhook endpoint 정상 → image mutate 정상.
#
# 본 Application 은 이제 istiod chart 만 single-source.
#
# 본 PoC 단계 — PeerAuthentication STRICT 로 클러스터 전체 mTLS 강제
# (별도 PeerAuthentication 매니페스트는 platform/12-istio-gateway/manifests/ 에).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-cp
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    chart: istiod
    repoURL: https://istio-release.storage.googleapis.com/charts
    targetRevision: 1.23.3
    helm:
      releaseName: istiod
      values: |
        # PoC 규모 단일 replica
        pilot:
          replicaCount: 1
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi
        # Telemetry — Prometheus scrape 가능하도록 ServiceMonitor 생성
        telemetry:
          enabled: true
          v2:
            enabled: true
            prometheus:
              enabled: true
        # 모든 신규 sidecar 가 디폴트로 mTLS STRICT 모드 작동
        meshConfig:
          defaultConfig:
            proxyMetadata: {}
            tracing:
              sampling: 100.0
          enableTracing: true
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

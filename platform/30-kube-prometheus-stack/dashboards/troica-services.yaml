# R-42 (평가 기본 (3)-3 필수): Grafana 대시보드 — 서비스별 핵심 SLI.
#
# kube-prometheus-stack 의 grafana.sidecar.dashboards 가 label `grafana_dashboard=1`
# 를 가진 ConfigMap 을 모든 namespace 에서 검색하여 자동 import.
#
# Prometheus query 의 metric 이름은 Spring Boot 3.x + Micrometer 표준:
#   - http_server_requests_seconds_count    (Counter)
#   - http_server_requests_seconds_bucket   (Histogram, P99 계산)
# label: `application` (spring.application.name 자동 부착), `uri`, `method`, `status`, `outcome`
#
# Kafka exporter metric (Strimzi kafkaExporter):
#   - kafka_consumergroup_lag               (group/topic/partition 별)
#   - kafka_brokers                          (cluster 건강 상태)
apiVersion: v1
kind: ConfigMap
metadata:
  name: troica-services-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  troica-services.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "schemaVersion": 39,
      "tags": ["troica", "msa"],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" }
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Troica — 서비스 SLI 대시보드",
      "uid": "troica-services",
      "version": 1,
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "요청 처리량 (req/s) — 서비스별",
          "description": "Spring Boot http_server_requests_seconds_count 5분 rate. application label 별 groupBy.",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (application) (rate(http_server_requests_seconds_count{application=~\"product-service|order-service|inventory-service|user-service|auth-service|api-gateway\"}[5m]))",
              "legendFormat": "{{application}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "에러율 (5xx) — 서비스별",
          "description": "status 5xx 응답의 비율. 0.01 (1%) 초과 시 운영 점검 대상.",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (application) (rate(http_server_requests_seconds_count{status=~\"5..\",application=~\"product-service|order-service|inventory-service|user-service|auth-service|api-gateway\"}[5m]))\n  /\nsum by (application) (rate(http_server_requests_seconds_count{application=~\"product-service|order-service|inventory-service|user-service|auth-service|api-gateway\"}[5m]))",
              "legendFormat": "{{application}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              }
            }
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "P99 응답 시간 — 서비스별",
          "description": "http_server_requests_seconds_bucket 히스토그램에서 99 분위 계산. PROJECT_PLAN §1.3 성공 기준 = inventory P99 50ms 이하.",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.99, sum by (application, le) (rate(http_server_requests_seconds_bucket{application=~\"product-service|order-service|inventory-service|user-service|auth-service|api-gateway\"}[5m])))",
              "legendFormat": "{{application}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.3 },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Kafka Consumer Group Lag (평가 기본 (3)-6 선택)",
          "description": "Strimzi kafkaExporter 가 노출하는 consumergroup lag. order-service / inventory-service 의 consumer 처리 지연 감지.",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (consumergroup, topic) (kafka_consumergroup_lag{topic=~\"order\\\\..*\"})",
              "legendFormat": "{{consumergroup}} / {{topic}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 100 },
                  { "color": "red", "value": 1000 }
                ]
              }
            }
          }
        },
        {
          "id": 5,
          "type": "stat",
          "title": "JVM Heap 사용률 — 서비스별",
          "description": "jvm_memory_used_bytes / jvm_memory_max_bytes. 80% 이상이면 GC 압박.",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "refId": "A",
              "expr": "(jvm_memory_used_bytes{area=\"heap\",application=~\"product-service|order-service|inventory-service|user-service|auth-service|api-gateway\"} / jvm_memory_max_bytes{area=\"heap\",application=~\"product-service|order-service|inventory-service|user-service|auth-service|api-gateway\"})",
              "legendFormat": "{{application}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          }
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Resilience4j Circuit Breaker State (api-gateway InventoryQueryService, R-41)",
          "description": "resilience4j_circuitbreaker_state — 0=CLOSED, 1=OPEN, 2=HALF_OPEN. inventory-service 다운 시 OPEN 전환 확인.",
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "refId": "A",
              "expr": "resilience4j_circuitbreaker_state{name=\"inventory-service\"}",
              "legendFormat": "{{state}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          }
        }
      ]
    }

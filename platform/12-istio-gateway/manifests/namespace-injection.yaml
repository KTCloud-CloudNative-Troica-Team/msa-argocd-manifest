# sidecar 자동 주입 활성화 — market-{dev,prod} + istio-system namespace.
#
# market-{dev,prod}: service pod 에 envoy sidecar 자동 주입.
# istio-system:
#   istio gateway chart 1.23.3 의 templates/deployment.yaml 의 image field 가
#   hardcoded `image: auto`. chart 가 user-set image 값 받지 않음. `auto` 는
#   sidecar inject mutating webhook 가 실 image (docker.io/istio/proxyv2:1.23.3)
#   로 mutate 하도록 설계된 placeholder.
#   istio-system 에 inject label 없으면 webhook 의 namespaceSelector 가 reject →
#   ingressgateway pod 가 `auto` 그대로 pull 시도 → ErrImagePull.
#   istiod 의 chart default 의 pod template 에 `sidecar.istio.io/inject: "false"`
#   annotation 으로 자기 자신 inject 회피 → namespace label 추가 안전.
#
# 본 매니페스트 는 ArgoCD ApplicationSet (applications/appset.yaml) 이 12 Application
# 을 sync 할 때 syncOptions=CreateNamespace=true 로 자동 생성하나, 그 자동 생성은
# label 없이. label 부착이 필요 → 본 매니페스트가 server-side apply 로 label 추가.
---
apiVersion: v1
kind: Namespace
metadata:
  name: market-dev
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: market-prod
  labels:
    istio-injection: enabled
---
apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
  labels:
    istio-injection: enabled

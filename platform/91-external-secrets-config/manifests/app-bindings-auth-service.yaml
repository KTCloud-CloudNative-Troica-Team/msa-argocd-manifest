# auth-service ENV 바인딩 — Secret (DB password / JWT) + ConfigMap (host/port/JPA).
#
# 6 polyrepo 의 application.yml 직접 확인 기준 ENV 매핑 (R-25/R-33 정식 fix).
# service Helm chart 가 envFrom 으로 ${svc}-secrets + ${svc}-config 참조.
#
# DB password: troica/db/auth-db (AWS Secrets Manager) → ExternalSecret
# JWT secret: troica/auth/jwt-secret (AWS Secrets Manager) → ExternalSecret
# DB host/port/name: K8s service DNS (CNPG read-write) → ConfigMap (static)
# Redis host: rfr-auth-redis.redis (Spotahome direct) → ConfigMap
# Redis password: 비어 있음 (Spotahome default 미설정 — application.yml 의 default 와
#                              안 일치하지만 PoC 단계 그대로. cluster 측 RedisFailover.spec.auth 설정 후 보강)
---
# market-dev
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-service-secrets
  namespace: market-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: auth-service-secrets
    creationPolicy: Owner
    template:
      data:
        # envFrom 마운트 시 그대로 ENV 이름 됨. application.yml 의 ${AUTH_DB_PASSWORD},
        # ${JWT_SECRET} 와 일치.
        AUTH_DB_PASSWORD: "{{ .dbPassword }}"
        JWT_SECRET: "{{ .jwtSecret }}"
        # Redis password 비활성 (Spotahome auth 미설정). Spring 의 default 는 "auth-service"
        # 인데 그러면 connection fail. 빈 문자열로 override.
        REDIS_PASSWORD: "troica-redis-poc-pw-dev"
  data:
    - secretKey: dbPassword
      remoteRef:
        key: troica/db/auth-db
        property: password
    - secretKey: jwtSecret
      remoteRef:
        key: troica/auth/jwt-secret
        property: secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: market-dev
data:
  AUTH_DB_HOST: "auth-db-rw.databases.svc.cluster.local"
  AUTH_DB_PORT: "5432"
  AUTH_DB_NAME: "auth"
  AUTH_DB_USERNAME: "auth"
  JPA_DDL_AUTO: "update"  # PoC 단계 — schema 자동 생성. 운영은 validate.
  JPA_SHOW_SQL: "false"
  REDIS_HOST: "rfr-auth-redis.redis.svc.cluster.local"
  REDIS_PORT: "6379"
  SERVER_PORT: "8005"
  GRPC_SERVER_PORT: "9005"
---
# market-prod (동일 패턴, namespace 만 다름)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-service-secrets
  namespace: market-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: auth-service-secrets
    creationPolicy: Owner
    template:
      data:
        AUTH_DB_PASSWORD: "{{ .dbPassword }}"
        JWT_SECRET: "{{ .jwtSecret }}"
        REDIS_PASSWORD: "troica-redis-poc-pw-dev"
  data:
    - secretKey: dbPassword
      remoteRef:
        key: troica/db/auth-db
        property: password
    - secretKey: jwtSecret
      remoteRef:
        key: troica/auth/jwt-secret
        property: secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: market-prod
data:
  AUTH_DB_HOST: "auth-db-rw.databases.svc.cluster.local"
  AUTH_DB_PORT: "5432"
  AUTH_DB_NAME: "auth"
  AUTH_DB_USERNAME: "auth"
  JPA_DDL_AUTO: "validate"  # 운영은 schema 변경 X
  JPA_SHOW_SQL: "false"
  REDIS_HOST: "rfr-auth-redis.redis.svc.cluster.local"
  REDIS_PORT: "6379"
  SERVER_PORT: "8005"
  GRPC_SERVER_PORT: "9005"

# Postgres credentials ExternalSecret × 6.
# 각 DB 별 user/password 가 AWS Secrets Manager 의 `troica/db/<service>-db` JSON key
# 에 저장됨. ExternalSecret 이 K8s Secret 으로 sync → CNPG Cluster CR 의 bootstrap
# 또는 client 가 reference.
#
# Secret payload 형식 (Secrets Manager 에 사용자가 등록):
#   { "username": "...", "password": "..." }
#
# 본 매니페스트는 target namespace = databases (CNPG bootstrap 용). 추가로 각 service
# namespace (market-dev / market-prod) 에서도 동일 secret 이 필요하면 별도 ExternalSecret
# 정의 (또는 secrets propagation tool 사용).
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-db-credentials
  namespace: databases
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: auth-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: troica/db/auth-db
        property: username
    - secretKey: password
      remoteRef:
        key: troica/db/auth-db
        property: password

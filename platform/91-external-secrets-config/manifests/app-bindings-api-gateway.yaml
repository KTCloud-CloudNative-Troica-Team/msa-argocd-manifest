# api-gateway ENV 바인딩 — Redis (Rate Limit) + gRPC client (5 service) + routes.
#
# api-gateway 의 application.yml 은 DB / JWT secret 직접 사용 X (gRPC 로 auth-service
# 호출). placeholder 만 필요 (service Helm chart 의 envFrom secretRef 충족용).
#
# 이전 cycle: ExternalSecret 의 `data: []` 사용 → ESO spec 검증 거부 (data 또는
# dataFrom 중 최소 1 항목 필요) → cluster 에 Secret 생성 안 됨 → api-gateway pod
# CreateContainerConfigError "secret api-gateway-secrets not found".
# 본 cycle: plain K8s Secret 으로 변경. Secrets Manager fetch 없으므로 ExternalSecret
# 패턴 불필요. 단순 정적 Secret 가 의도에 정합.
---
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secrets
  namespace: market-dev
type: Opaque
stringData:
  # Spotahome Redis auth 미설정. application.yml 의 default 가 password 미설정
  # 이라 빈 ENV 로 충분.
  REDIS_PASSWORD: "troica-redis-poc-pw-dev"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: market-dev
data:
  # Spotahome inventory-redis 의 direct service. R-50 SC Gateway Rate Limit 의
  # Reactive Redis client 가 이걸 사용.
  REDIS_HOST: "rfr-inventory-redis.redis.svc.cluster.local"
  REDIS_PORT: "6379"
  # SC Gateway routes 의 backend URI
  ROUTE_USER_SERVICE_URI: "http://user-service.market-dev.svc.cluster.local:8004"
  ROUTE_ORDER_SERVICE_URI: "http://order-service.market-dev.svc.cluster.local:8002"
  # BFF (gRPC client) backend 들 — static://host:port 형식 (Spring gRPC 명세)
  GRPC_PRODUCT_SERVICE_ADDR: "static://product-service.market-dev.svc.cluster.local:9001"
  GRPC_ORDER_SERVICE_ADDR: "static://order-service.market-dev.svc.cluster.local:9002"
  GRPC_INVENTORY_SERVICE_ADDR: "static://inventory-service.market-dev.svc.cluster.local:9003"
  GRPC_AUTH_SERVICE_ADDR: "static://auth-service.market-dev.svc.cluster.local:9005"
  SERVER_PORT: "8100"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secrets
  namespace: market-prod
type: Opaque
stringData:
  REDIS_PASSWORD: "troica-redis-poc-pw-dev"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: market-prod
data:
  REDIS_HOST: "rfr-inventory-redis.redis.svc.cluster.local"
  REDIS_PORT: "6379"
  ROUTE_USER_SERVICE_URI: "http://user-service.market-prod.svc.cluster.local:8004"
  ROUTE_ORDER_SERVICE_URI: "http://order-service.market-prod.svc.cluster.local:8002"
  GRPC_PRODUCT_SERVICE_ADDR: "static://product-service.market-prod.svc.cluster.local:9001"
  GRPC_ORDER_SERVICE_ADDR: "static://order-service.market-prod.svc.cluster.local:9002"
  GRPC_INVENTORY_SERVICE_ADDR: "static://inventory-service.market-prod.svc.cluster.local:9003"
  GRPC_AUTH_SERVICE_ADDR: "static://auth-service.market-prod.svc.cluster.local:9005"
  SERVER_PORT: "8100"

# 애플리케이션 비밀값 ExternalSecret — JWT secret / Slack webhooks / Grafana admin.
#
# R-25 JWT secret: auth-service 의 application.yaml 에 `jwt.secret` 환경변수로 주입.
#                  현재 placeholder fallback 상태 → 본 매니페스트가 sync 되면 실값으로
#                  대체.
# R-47 Slack webhooks: AlertManager 가 mount 하는 Secret 명 = alertmanager-slack-webhooks
#                      (kube-prometheus-stack values 의 alertmanager.secrets 참조).

# ===== auth-service JWT secret (R-25) =====
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-jwt-secret
  namespace: market-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: auth-jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: troica/auth/jwt-secret
        property: secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-jwt-secret
  namespace: market-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: auth-jwt-secret
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: troica/auth/jwt-secret
        property: secret

# ===== AlertManager Slack webhooks (R-47) =====
# ADR-0010 채널 분리 — default (#alerts) + security (#security-report) 두 webhook URL.
# 사용자가 SecretsManager 의 `troica/slack/webhooks` 에 다음 JSON 등록:
#   { "default-url": "https://hooks.slack.com/...", "security-url": "https://hooks.slack.com/..." }
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-slack-webhooks
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: alertmanager-slack-webhooks
    creationPolicy: Owner
    template:
      data:
        # AlertManager 가 `api_url_file: /etc/alertmanager/secrets/.../url` 로 mount.
        # Secret key 명 = sub-directory 명 (slack-default-url / slack-security-url).
        slack-default-url: "{{ .defaultUrl }}"
        slack-security-url: "{{ .securityUrl }}"
  data:
    - secretKey: defaultUrl
      remoteRef:
        key: troica/slack/webhooks
        property: default-url
    - secretKey: securityUrl
      remoteRef:
        key: troica/slack/webhooks
        property: security-url

# ===== Grafana admin credentials =====
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: troica/grafana/admin
        property: user
    - secretKey: admin-password
      remoteRef:
        key: troica/grafana/admin
        property: password

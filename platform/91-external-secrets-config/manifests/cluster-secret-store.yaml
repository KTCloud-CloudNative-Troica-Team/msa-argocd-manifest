# ClusterSecretStore — AWS Secrets Manager 를 backend 로 등록.
# 모든 namespace 의 ExternalSecret 이 이 store 를 spec.secretStoreRef 로 참조.
#
# 인증 방식: EC2 node instance profile (R-29 ecr-credential-provider 와 동일 패턴).
# 본 cluster 는 self-managed kubeadm 이라 EKS IRSA / OIDC provider 가 없음. 따라서
# spec.provider.aws.auth 섹션은 생략 — ESO operator pod 가 호출하는 AWS SDK 가
# default credential provider chain 으로 IMDS → EC2 node IAM role 자동 사용.
#
# 사전 조건 (msa-provisioning terraform):
#   - EC2 node IAM role 에 `secretsmanager:GetSecretValue` policy 부착 필요.
#     (해당 role 은 이미 R-29 에서 ECR / kubelet credential 권한 보유 중)
#   - Resource 범위 권장: `arn:aws:secretsmanager:ap-northeast-2:<account>:secret:troica/*`
#
# 잘못된 IRSA 시도 (회피): `auth.jwt.serviceAccountRef` 를 명시하면 ESO 가 STS
# AssumeRoleWithWebIdentity 호출 → self-managed cluster 에는 OIDC provider 부재로
# 실패. fix 이전 매니페스트는 이 잘못된 패턴이었음.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2

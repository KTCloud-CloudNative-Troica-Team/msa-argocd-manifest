# ClusterSecretStore — AWS Secrets Manager 를 backend 로 등록.
# 모든 namespace 의 ExternalSecret 이 이 store 를 spec.secretStoreRef 로 참조.
#
# 인증 방식: kubelet instance profile (R-29 ecr-credential-provider 와 동일 IRSA 패턴).
# 별도 access key 주입 불필요. EC2 node 의 IAM role 이 SecretsManager:GetSecretValue
# 권한 보유 (msa-provisioning terraform 에 추가 필요 — R-25 운영 작업).
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

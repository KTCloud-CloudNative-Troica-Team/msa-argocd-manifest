# order-service ENV 바인딩 — DB + Kafka.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: order-service-secrets
  namespace: market-dev
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: order-service-secrets
    creationPolicy: Owner
    template:
      data:
        ORDER_DB_PASSWORD: "{{ .dbPassword }}"
  data:
    - secretKey: dbPassword
      remoteRef:
        key: troica/db/order-db
        property: password
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: market-dev
data:
  ORDER_DB_HOST: "order-db-rw.databases.svc.cluster.local"
  ORDER_DB_PORT: "5432"
  ORDER_DB_NAME: "order"
  ORDER_DB_USERNAME: "order"
  JPA_DDL_AUTO: "update"
  JPA_SHOW_SQL: "false"
  # Strimzi 의 internal bootstrap (port 9092, plaintext) — ADR-0004 dot notation 토픽명
  KAFKA_BOOTSTRAP_SERVERS: "market-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC_ORDER_PENDING: "order.pending"
  KAFKA_TOPIC_ORDER_INVENTORY_RESERVED: "order.inventory-reserved"
  KAFKA_TOPIC_ORDER_CONFIRMED: "order.confirmed"
  KAFKA_TOPIC_ORDER_CANCELLED: "order.cancelled"
  SERVER_PORT: "8002"
  GRPC_SERVER_PORT: "9002"
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: order-service-secrets
  namespace: market-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: order-service-secrets
    creationPolicy: Owner
    template:
      data:
        ORDER_DB_PASSWORD: "{{ .dbPassword }}"
  data:
    - secretKey: dbPassword
      remoteRef:
        key: troica/db/order-db
        property: password
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: market-prod
data:
  ORDER_DB_HOST: "order-db-rw.databases.svc.cluster.local"
  ORDER_DB_PORT: "5432"
  ORDER_DB_NAME: "order"
  ORDER_DB_USERNAME: "order"
  JPA_DDL_AUTO: "validate"
  JPA_SHOW_SQL: "false"
  KAFKA_BOOTSTRAP_SERVERS: "market-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC_ORDER_PENDING: "order.pending"
  KAFKA_TOPIC_ORDER_INVENTORY_RESERVED: "order.inventory-reserved"
  KAFKA_TOPIC_ORDER_CONFIRMED: "order.confirmed"
  KAFKA_TOPIC_ORDER_CANCELLED: "order.cancelled"
  SERVER_PORT: "8002"
  GRPC_SERVER_PORT: "9002"

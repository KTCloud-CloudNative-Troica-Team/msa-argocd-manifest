# Strimzi Kafka CR — KRaft 모드 (ZooKeeper 미사용, 2026 권장).
# 1 broker (PoC memory diet) + 내부 metrics + Prometheus ServiceMonitor.
#
# 메모리 압박 (worker t3.large × 3 = 24GB) 으로 PoC 단계 broker 1 개.
# KRaft 의 단일 노드는 controller + broker dual-role 로 작동. 운영 단계는 3 broker
# (다른 AZ 분산) + RF=3 + min.insync.replicas=2 로 환원 필요.
# replication factor 도 같이 1 로 (1 broker 시 RF 3 = topic 생성 실패).
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: kafka
  labels:
    strimzi.io/cluster: market-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 20Gi
        deleteClaim: false
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      memory: 1Gi
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: market-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 3.8.0
    metadataVersion: 3.8-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
    config:
      # 1 broker 시 RF=3 / min.isr=2 는 topic 생성 실패. 모두 1 로 다이어트.
      # 운영 단계 환원 필수.
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
    # Prometheus JMX exporter — broker metrics scrape (kube-prometheus-stack 이 자동 발견)
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml
  # entity-operator 가 KafkaTopic CR / KafkaUser CR reconcile
  entityOperator:
    topicOperator: {}
    userOperator: {}
  # kafka-exporter — consumer-group lag metrics (평가 기본 (3)-6)
  kafkaExporter:
    topicRegex: "order\\..*"
    groupRegex: ".*"

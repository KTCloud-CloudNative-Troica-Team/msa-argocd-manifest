# Kafka JMX → Prometheus 변환 rule. Strimzi 공식 sample 의 minimal subset.
# kafka.yaml 의 spec.kafka.metricsConfig.valueFrom.configMapKeyRef 가 참조함.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-metrics
  namespace: kafka
data:
  kafka-metrics-config.yml: |
    # JMX 객체 이름을 Prometheus metric 으로 매핑. 핵심 broker metrics 만.
    lowercaseOutputName: true
    rules:
      # Kafka request metrics
      - pattern: kafka.server<type=(.+), name=(.+), clientId=(.+), topic=(.+), partition=(.*)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          clientId: "$3"
          topic: "$4"
          partition: "$5"
      - pattern: kafka.server<type=(.+), name=(.+), topic=(.+), partition=(.*)><>Value
        name: kafka_server_$1_$2
        type: GAUGE
        labels:
          topic: "$3"
          partition: "$4"
      - pattern: kafka.server<type=(.+), name=(.+), topic=(.+)><>Count
        name: kafka_server_$1_$2_total
        type: COUNTER
        labels:
          topic: "$3"
      - pattern: kafka.server<type=(.+), name=(.+)><>Count
        name: kafka_server_$1_$2_total
        type: COUNTER
      - pattern: kafka.controller<type=(.+), name=(.+)><>Value
        name: kafka_controller_$1_$2
        type: GAUGE
      # KRaft metadata metrics (3.x KRaft mode)
      - pattern: kafka.server<type=raft-metrics, name=(.+)><>Value
        name: kafka_server_raft_$1
        type: GAUGE

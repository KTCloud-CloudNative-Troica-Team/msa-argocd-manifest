# CNPG Cluster CR × 6 — 서비스별 독립 Postgres (Database per Service).
#
# 각 Cluster 는:
#   - instances: 2 (primary + replica, PoC 규모)
#   - storage: 10Gi EBS gp3
#   - bootstrap.initdb: 초기 DB 이름 / 사용자 — credentials 는 ExternalSecret 으로
#     주입 (platform/91-external-secrets-config/)
#
# PoC 규모라 단일 DB instance + replica 1. 운영 단계는 instances=3 + read replica
# 별도 검토.
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: auth-db
  namespace: databases
spec:
  instances: 2
  bootstrap:
    initdb:
      database: auth
      owner: auth
      secret:
        name: auth-db-credentials  # ExternalSecret 으로 동기화
  storage:
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  monitoring:
    enablePodMonitor: true
---

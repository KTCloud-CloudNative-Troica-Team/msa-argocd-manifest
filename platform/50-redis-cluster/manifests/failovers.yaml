# Spotahome RedisFailover CR × 2.
#
# 1) auth-redis — auth-service 의 refresh-token / blacklist 저장
# 2) inventory-redis — inventory-service 의 stock cache + R-50 Rate Limit Token Bucket
#    (api-gateway 가 reactive 클라이언트로 접근)
#
# 메모리 압박 (worker t3.large × 3 = 24GB) 으로 PoC 단계 다이어트:
#   sentinel.replicas 3 → 1, redis.replicas 2 → 1 (master only).
# 2 RedisFailover × (3 sentinel + 2 redis) → (1 sentinel + 1 redis) = 6 pod 절감.
# Sentinel quorum (3 필요) 손실. failover 검증은 평가 항목 아님 — 단순 read/write 만 demo.
# 운영 단계는 sentinel 3 + redis 3 환원.
---
apiVersion: databases.spotahome.com/v1
kind: RedisFailover
metadata:
  name: auth-redis
  namespace: redis
spec:
  sentinel:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  redis:
    replicas: 1     # master only (PoC diet — replica 제거)
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
    storage:
      persistentVolumeClaim:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    # Prometheus exporter — kube-prometheus-stack 이 scrape
    exporter:
      enabled: true
---
apiVersion: databases.spotahome.com/v1
kind: RedisFailover
metadata:
  name: inventory-redis
  namespace: redis
spec:
  sentinel:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi
  redis:
    replicas: 1     # master only (PoC diet — replica 제거)
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
    storage:
      persistentVolumeClaim:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
    exporter:
      enabled: true

# R-35 (b): Redis × 2 (auth-redis + inventory-redis) — auth refresh-token / inventory
# stock cache + R-50 SC Gateway Rate Limit Token Bucket.
#
# 이전 Spotahome RedisFailover operator → 단순 K8s Deployment+Service 로 교체
# (manifests/redis-deployments.yaml). 사유는 매니페스트 자체 헤더 코멘트 참조.
# Sync Wave 도 더 이상 operator 의존 X. PoC: Wave 2 유지 (CNPG/Kafka 와 같은 wave).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis-cluster
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: https://github.com/KTCloud-CloudNative-Troica-Team/msa-argocd-manifest.git
    targetRevision: main
    path: platform/50-redis-cluster/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: redis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

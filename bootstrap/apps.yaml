# Phase 0 вХђьіИВіцьіИвъЕ ВъљВІЮ ApplicationвЊц.
# root-appВЮ┤ в│И ьїїВЮ╝ВЮё syncьЋўвЕ┤ 3Ж░ю ВъљВІЮ ApplicationВЮ┤ ВЃЮВё▒вљўЖ│а,
# Ж░ЂВъљ ВъљЖИ░ ВўЂВЌГ(projects/, platform/, applications/)ВЮё syncьЋювІц.
#
# в│И ьїїВЮ╝ВЮђ multi-document yaml Рђћ `---` ЖхгвХёВъљвАю 3Ж░ю Application ВаЋВЮў.
#
# Ж░Ђ ApplicationВЮў destination namespaceвіћ ArgoCDЖ░ђ CRDвЦ╝ вДївЊювіћ ВюёВ╣ў (argocd).
# ВІцВаю sync вїђВЃЂ CRDВЮў namespaceвіћ Ж░Ђ вДцвІѕьјўВіцьіИ ВъљВ▓┤ВЮў metadataВЌљ ВаЋВЮўвље.
---
# ВъљВІЮ 1 Рђћ projects/: AppProject CRD 2Ж░ю (market, platform)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-projects
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/KTCloud-CloudNative-Troica-Team/msa-argocd-manifest.git
    targetRevision: main
    path: projects
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
---
# ВъљВІЮ 2 Рђћ platform/: platform-app App-of-Apps (Istio, observability вЊ▒)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/KTCloud-CloudNative-Troica-Team/msa-argocd-manifest.git
    targetRevision: main
    path: platform
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
---
# ВъљВІЮ 3 Рђћ applications/: market-services ApplicationSet (6 service ├Ќ 2 env)
# applications/ ВЋѕВЌљвіћ charts/, values/ вћћваЅьєавдгвЈё ВъѕВДђвДї recurse:falseвЮ╝
# В▓Ф ваѕв▓е yaml(appset.yaml)вДї sync. include:'appset.yaml'вАю вЇћ вфЁВІюВаЂ.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-applications
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/KTCloud-CloudNative-Troica-Team/msa-argocd-manifest.git
    targetRevision: main
    path: applications
    directory:
      recurse: false
      include: 'appset.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

# 단일 부트스트랩 진입점.
# `kubectl apply -f bootstrap/root-app.yaml` 한 번으로 다음을 sync한다 (sync-wave 순):
#   wave -10 : projects/market-project.yaml, projects/platform-project.yaml          (AppProject CRD)
#   wave   0 : platform/root.yaml                                                    (platform App-of-Apps)
#   wave   0 : applications/appset.yaml                                              (market ApplicationSet)
#
# 사전 조건:
#   - ArgoCD가 클러스터에 설치돼있고 `argocd` namespace 존재.
#   - 본 매니페스트 레포가 GitHub에서 public이거나 ArgoCD가 read 권한이 있는 상태.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/KTCloud-CloudNative-Troica-Team/msa-argocd-manifest.git
    targetRevision: main
    path: .
    directory:
      recurse: false
      include: '{projects/market-project.yaml,projects/platform-project.yaml,platform/root.yaml,applications/appset.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

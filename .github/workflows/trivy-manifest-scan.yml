# R-46 (평가 심화 (2)-2): Kubernetes 매니페스트 보안 스캔.
#
# trivy config 모드는 IaC (Helm/K8s yaml/Dockerfile/Terraform 등) 의 misconfig
# 를 검사함. 본 레포는 매니페스트만 보유하므로 image scan은 각 polyrepo CI에서
# 따로 수행함 (역할 분리).
#
# 검출 대상 (예시):
#  - privileged: true / hostNetwork: true / hostPID: true
#  - runAsUser: 0 (root 실행)
#  - 누락된 resources / probes / securityContext
#  - 권한 과다 RBAC rules (verbs: ["*"]) — R-48 troica-sre가 일부러 cluster-admin
#    을 바인딩한 부분은 ignore 처리 필요 (.trivyignore)
#
# SARIF 출력을 GitHub Security 탭에 업로드 → PR diff에 인라인 코멘트로 표시됨.

name: Trivy manifest scan (R-46)

on:
  push:
    branches: [main]
    paths:
      - "applications/**"
      - "platform/**"
      - "bootstrap/**"
      - "projects/**"
      - ".github/workflows/trivy-manifest-scan.yml"
  pull_request:
    branches: [main]
    paths:
      - "applications/**"
      - "platform/**"
      - "bootstrap/**"
      - "projects/**"
      - ".github/workflows/trivy-manifest-scan.yml"

# SARIF 업로드에 필요한 권한.
permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Helm 차트는 render 후 스캔해야 misconfig가 보임. 본 레포의 공통 차트는
      # values per service에 의해 의미가 결정되므로 chart 자체에 대한 정적 스캔만
      # 수행함. 향후 ApplicationSet 렌더링 결과를 검사하려면 별도 step 추가 가능.
      - name: Trivy config scan (HIGH/CRITICAL fail)
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: false
          format: sarif
          output: trivy-results.sarif
          # privileged 컨테이너 / root 실행 / hostNetwork 등 K8s 보안 misconfig
          # 표준 룰셋 사용. 추가 정책은 trivyignore 또는 trivy.yaml로 관리.
          skip-dirs: "docs"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-config

      # 발견된 보안 위반을 Slack #security-report 채널에도 발송 (R-47).
      # SLACK_SECURITY_WEBHOOK_URL 은 Org Secret 으로 등록 필요. 미설정 상태에서는
      # slack-github-action 이 빈 webhook 으로 fail 함 — continue-on-error: true 로
      # workflow 전체에 영향 X (어차피 trivy step 이 이미 fail 상태).
      #
      # 주의: GitHub Actions 의 `if:` 표현식 안에서 `secrets.*` 직접 참조 불가 (보안
      # 정책). secrets 존재 여부 체크 는 step 의 env 또는 별도 boolean job 으로 노출
      # 후에야 가능하므로 단순히 if: failure() 로 작성하고 continue-on-error 로 보정.
      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook-type: incoming-webhook
          webhook: ${{ secrets.SLACK_SECURITY_WEBHOOK_URL }}
          payload: |
            {
              "text": ":rotating_light: Trivy manifest scan FAILED — `${{ github.repository }}` @ `${{ github.ref_name }}`",
              "blocks": [
                {"type":"header","text":{"type":"plain_text","text":"Trivy manifest scan FAILED"}},
                {"type":"section","fields":[
                  {"type":"mrkdwn","text":"*Repo:*\n${{ github.repository }}"},
                  {"type":"mrkdwn","text":"*Ref:*\n${{ github.ref_name }}"},
                  {"type":"mrkdwn","text":"*Actor:*\n${{ github.actor }}"},
                  {"type":"mrkdwn","text":"*Run:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|view>"}
                ]}
              ]
            }

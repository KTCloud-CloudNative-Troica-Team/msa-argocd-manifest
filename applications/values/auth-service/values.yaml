nameOverride: auth-service

image:
  repository: 601766312629.dkr.ecr.ap-northeast-2.amazonaws.com/msa/auth-service

service:
  port: 8005          # SPEC §1.4 (notification 폐기 → auth로 재할당)
  grpcPort: 9005      # R-25: api-gateway 의 JwtHeaderCheckFilter 가 gRPC client 로
                      # auth-service.checkValidity() 호출. K8s Service 가 9005 forward.

envFrom:
  - secretRef:
      name: auth-service-secrets        # DB password + Redis password + JWT_SECRET — ExternalSecrets
  - configMapRef:
      name: auth-service-config         # DB host, Redis host

probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 30
  readiness:
    path: /healthz
    initialDelaySeconds: 10

istio:
  enabled: true

# auth-service는 worker 분기 없음
worker:
  enabled: false

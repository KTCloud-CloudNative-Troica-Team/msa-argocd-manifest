# Troica common chart - default values.
# Per-service values (applications/values/<service>/values.yaml) override these.
# Per-env values (applications/values/<service>/values-<env>.yaml) override per-service.

nameOverride: ""
fullnameOverride: ""

image:
  repository: ""              # values per service에서 override (예: <ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/msa/order-service)
  tag: "latest"               # CI가 main-<sha>로 override
  pullPolicy: IfNotPresent

replicaCount: 2

serviceAccount:
  create: true
  annotations: {}

service:
  type: ClusterIP
  port: 8080

# Spring Boot 프로파일 - 환경별 values에서 set (예: "dev", "prod")
springProfilesActive: ""

# 일반 env vars - values per service/env에서 추가
env: []
# - name: SPRING_DATASOURCE_URL
#   value: jdbc:postgresql://...

# envFrom (secretRef / configMapRef) - values per service에서 추가
envFrom: []
# - secretRef:
#     name: order-service-secrets
# - configMapRef:
#     name: order-service-config

# Optional ConfigMap이 차트 내에서 생성될 때 사용할 key-value (envFrom: configMapRef와 이름 매칭)
# 비워두면 ConfigMap 자체가 렌더링되지 않음
configMap: {}
# configMap:
#   SPRING_KAFKA_BOOTSTRAP_SERVERS: market-kafka-bootstrap.kafka:9092

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# PodDisruptionBudget (R-43, 평가 심화 (1)-3)
# 클러스터 유지보수(drain) 시 최소 Pod 가용성 보장.
# 기본 replicaCount=2 + minAvailable=1 → 한 번에 1개씩만 disrupt 허용.
# prod 권장: values-prod.yaml에서 replicaCount=3 + pdb.minAvailable=2 override.
pdb:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1   # minAvailable과 둘 중 하나만 사용

  # worker Deployment의 PDB (worker.enabled=true일 때만 적용)
  # worker는 보통 replicaCount=1이므로 minAvailable 대신 maxUnavailable=1로
  # 한 번에 한 Pod만 down 허용 (drain 가능 유지).
  worker:
    enabled: true
    maxUnavailable: 1

# 서비스별 RBAC (R-48, 평가 심화 (3)-2)
# - ServiceAccount는 serviceAccount.create 로 분리됨 (위 섹션 참조)
# - Role + RoleBinding을 차트가 생성하여 ClusterRole 대신 namespace 한정 최소 권한 적용
# - 기본 rules=[] = K8s API 일체 접근 불가 (진정한 최소 권한)
# - K8s API 호출 필요 시 (예: Spring Cloud Kubernetes) values per service에서 rules 추가
rbac:
  create: true
  rules: []
  # rules:
  #   - apiGroups: [""]
  #     resources: ["configmaps"]
  #     resourceNames: ["<my-service>-config"]
  #     verbs: ["get", "watch"]

probes:
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 30
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 10

# Istio가 최종 mesh. 미설치 단계(Phase 1~4)에서도 sidecar inject annotation은 무해.
istio:
  enabled: true
  virtualService:
    enabled: false
    hosts: []
    gateways: []

# order-worker처럼 동일 이미지로 별도 Deployment를 추가로 띄울 때 활성화
worker:
  enabled: false
  springProfilesActive: "worker"
  replicaCount: 1

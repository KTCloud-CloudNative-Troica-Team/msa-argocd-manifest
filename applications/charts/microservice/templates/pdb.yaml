{{- /*
R-43 (평가 심화 (1)-3): PodDisruptionBudget
클러스터 유지보수(drain) 시 최소 Pod 가용성 보장 — 한 번에 전부 evict 방지.

기본값: replicaCount=2 + minAvailable=1 → 1개 Pod는 항상 running, 1개씩만 disrupt 가능.
prod 권장: values-prod.yaml에서 replicaCount=3 + pdb.minAvailable=2 override.

worker Deployment는 보통 replicaCount=1 (Outbox poller, Batch worker 단일 인스턴스)
→ PDB minAvailable=1로 묶으면 drain 불가 → maxUnavailable=1로 한 번에 down 허용.
*/}}
{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "microservice.fullname" . }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
    role: api
spec:
  {{- if hasKey .Values.pdb "minAvailable" }}
  minAvailable: {{ .Values.pdb.minAvailable }}
  {{- else if hasKey .Values.pdb "maxUnavailable" }}
  maxUnavailable: {{ .Values.pdb.maxUnavailable }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "microservice.selectorLabels" . | nindent 6 }}
      role: api
{{- if and .Values.worker.enabled .Values.pdb.worker.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "microservice.fullname" . }}-worker
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
    role: worker
spec:
  maxUnavailable: {{ .Values.pdb.worker.maxUnavailable | default 1 }}
  selector:
    matchLabels:
      {{- include "microservice.selectorLabels" . | nindent 6 }}
      role: worker
{{- end }}
{{- end }}

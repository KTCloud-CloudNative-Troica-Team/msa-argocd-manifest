apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "microservice.fullname" . }}
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # R-44 (B) 사전: rolling update 시 zero-downtime 보장.
  # K8s default = maxSurge 25% / maxUnavailable 25%. replicas=1 일 때 25% 가
  # round down 시 0 / 0 → K8s 가 한쪽을 1 로 보정. 명시적 hardcode 가 더 안전.
  # maxSurge=1: 새 pod 1 개 추가 (replica + 1 → replica).
  # maxUnavailable=0: 옛 pod 종료 시 모든 옛 pod 가 still ready → downtime 0.
  # 결과: 항상 ≥ replicaCount 개 pod available 상태로 rollout.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "microservice.selectorLabels" . | nindent 6 }}
      role: api
  template:
    metadata:
      labels:
        {{- include "microservice.selectorLabels" . | nindent 8 }}
        role: api
      annotations:
        sidecar.istio.io/inject: "{{ .Values.istio.enabled }}"
    spec:
      serviceAccountName: {{ include "microservice.fullname" . }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
            {{- if .Values.service.grpcPort }}
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
            {{- end }}
          env:
            # R-42 (평가 기본 (3)-3 필수): Spring Boot actuator/prometheus endpoint 노출.
            # Spring Boot default = `health` 만 노출 → /actuator/prometheus 404 →
            # ServiceMonitor scrape 실패 (up = 0) → Prometheus 측 metric 없음 →
            # Grafana panel No data. 본 env 가 Spring Boot 의 RelaxedBinding 으로
            # management.endpoints.web.exposure.include 매핑 → prometheus + metrics +
            # info + health 노출. R-41 의 resilience4j_circuitbreaker_state 도 함께 노출.
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,prometheus,info,metrics"
            {{- if .Values.springProfilesActive }}
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.springProfilesActive | quote }}
            {{- end }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # Spring Boot 3.5 + JPA + Hibernate + HikariCP + Redis + Kafka 합산 startup
          # 시간이 40-50초 발생. liveness 의 initialDelaySeconds 30s + (failureThreshold 3
          # × periodSeconds 10s) = 60s window 안에 ready 가 안 되면 kubelet 이 죽임.
          # startupProbe 로 startup 단계 까지 liveness/readiness 보호 (failureThreshold
          # × periodSeconds 합산이 startup 시간 보다 큰 값으로).
          startupProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

{{- if .Values.worker.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "microservice.fullname" . }}-worker
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
    role: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "microservice.selectorLabels" . | nindent 6 }}
      role: worker
  template:
    metadata:
      labels:
        {{- include "microservice.selectorLabels" . | nindent 8 }}
        role: worker
      annotations:
        sidecar.istio.io/inject: "{{ .Values.istio.enabled }}"
    spec:
      serviceAccountName: {{ include "microservice.fullname" . }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # R-42 (평가 기본 (3)-3 필수): worker 도 actuator/prometheus 노출
            # (Resilience4j metric, JVM Heap, http_server_requests 측 같이 scrape)
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,prometheus,info,metrics"
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.worker.springProfilesActive | quote }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}

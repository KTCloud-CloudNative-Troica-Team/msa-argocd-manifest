apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: market-services
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/KTCloud-CloudNative-Troica-Team/msa-argocd-manifest.git
              revision: main
              directories:
                - path: applications/values/*
                - path: applications/values/_*       # _template 등 underscore prefix는 제외
                  exclude: true
          - list:
              elements:
                - env: dev
                # PoC memory diet — prod 환경 일시 비활성. 6 service × 2 env = 12
                # Application → 6 (dev only). 평가 demo 는 market-dev 만 사용.
                # 운영 단계 진입 시 prod 환경 환원 + 별도 prod 전용 cluster 분리 검토.
                # - env: prod
  template:
    metadata:
      name: '{{.path.basename}}-{{.env}}'
      labels:
        env: '{{.env}}'
        service: '{{.path.basename}}'
      annotations:
        # platform stateful workload (kafka / postgres / redis = Wave 2) + external
        # secrets config (Wave 3) + network policies (Wave 5) 모두 sync 후 service
        # Application 시작하도록 Wave 10. service pod 의 DB / Kafka / Redis 의존성
        # 충족 후 startup 가능. service Helm chart 자체에 wave 명시 없으면 그 Application
        # 의 wave 가 default 0 라 stateful 보다 빨라짐 → CrashLoopBackOff.
        argocd.argoproj.io/sync-wave: "10"
    spec:
      project: market
      source:
        repoURL: https://github.com/KTCloud-CloudNative-Troica-Team/msa-argocd-manifest.git
        targetRevision: main
        path: applications/charts/microservice
        helm:
          valueFiles:
            - ../../values/{{.path.basename}}/values.yaml
            - ../../values/{{.path.basename}}/values-{{.env}}.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: market-{{.env}}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
